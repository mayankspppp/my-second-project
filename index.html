<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Royal Stay Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🏨 Royal Stay Hotel</h1>
    <p>Luxury • Comfort • Experience</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Rooms</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Welcome to Royal Stay</h2>
    <p>Book your luxury room today</p>
</section>

<section class="rooms">

    <div class="card">
        <h3>Deluxe Room</h3>
        <p>₹2000 / night</p>
    </div>

    <div class="card">
        <h3>Premium Room</h3>
        <p>₹3500 / night</p>
    </div>

    <div class="card">
        <h3>Royal Suite</h3>
        <p>₹6000 / night</p>
    </div>

</section>

<section class="booking">
    <h2>Book a Room</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email" required>
        <input type="date" required>
        <button type="submit">Book Now</button>
    </form>
</section>

<footer>
    <p>Made by Mayank | Hotel Management Project</p>
</footer>

</body>
</html>
